x-logging: &default-logging
    driver: "json-file"
    options:
        max-size: "100m"
        max-file: "3"

networks:
    sds-gateway-local-seaweed-net:
        driver: bridge
    sds-network-local:
        external: true

volumes:
    prometheus-data:

services:
    # ─────────────────────────────────────────────────────────
    # MASTER
    # ─────────────────────────────────────────────────────────
    sfs-master:
        image: docker.io/chrislusf/seaweedfs:4.32_large_disk_full
        container_name: sds-gateway-local-sfs-master
        user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
        restart: unless-stopped
        networks:
            - sds-gateway-local-seaweed-net
        ports:
            - "${SFS_MASTER_PORT:-9333}:${SFS_MASTER_PORT:-9333}"
            - "${SFS_MASTER_GRPC_PORT:-19333}:${SFS_MASTER_GRPC_PORT:-19333}"
        environment:
            WEED_JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
        volumes:
            - ./data/master:/data
            - ./config/master.toml:/etc/seaweedfs/master.toml:ro
            - ./config/security.toml:/etc/seaweedfs/security.toml:ro
        logging: *default-logging
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${SFS_MASTER_PORT:-9333}/cluster/status >/dev/null",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 30s
            timeout: 5s
        # entrypoint: "sleep"
        # command: "600"
        command: |
            master
            -mdir=/data
             -ip=sfs-master
            -ip.bind=0.0.0.0
            -port=${SFS_MASTER_PORT:-9333}
            -metricsPort=${SFS_MASTER_METRICS_PORT:-9324}

    # ─────────────────────────────────────────────────────────
    # VOLUME — single volume server
    # ─────────────────────────────────────────────────────────
    sfs-volume:
        image: docker.io/chrislusf/seaweedfs:4.32_large_disk_full
        container_name: sds-gateway-local-sfs-volume
        user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
        restart: unless-stopped
        depends_on:
            - sfs-master
        networks:
            - sds-gateway-local-seaweed-net
        ports:
            - "${SFS_VOLUME_PORT:-8080}:${SFS_VOLUME_PORT:-8080}"
            - "${SFS_VOLUME_GRPC_PORT:-18080}:${SFS_VOLUME_GRPC_PORT:-18080}"
        environment:
            WEED_JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
        volumes:
            - ./data/volumes:/data
            - ./config/security.toml:/etc/seaweedfs/security.toml:ro
        logging: *default-logging
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${SFS_VOLUME_PORT:-8080}/healthz >/dev/null",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 30s
            timeout: 5s
        command: |
            volume
             -master=sfs-master:${SFS_MASTER_PORT:-9333}
             -ip=sfs-volume
            -ip.bind=0.0.0.0
            -port=${SFS_VOLUME_PORT:-8080}
            -max=0
            -dir=/data
            -index=leveldb
            -metricsPort=${SFS_VOLUME_METRICS_PORT:-9325}

    # ─────────────────────────────────────────────────────────
    # FILER
    # ─────────────────────────────────────────────────────────
    sfs-filer:
        image: docker.io/chrislusf/seaweedfs:4.32_large_disk_full
        container_name: sds-gateway-local-sfs-filer
        user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
        restart: unless-stopped
        depends_on:
            - sfs-master
            - sfs-volume
        networks:
            - sds-gateway-local-seaweed-net
        ports:
            - "${SFS_FILER_PORT:-8888}:${SFS_FILER_PORT:-8888}"
            - "${SFS_FILER_GRPC_PORT:-18888}:${SFS_FILER_GRPC_PORT:-18888}"
        environment:
            WEED_JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
            WEED_JWT_FILER_SIGNING_KEY: "${JWT_FILER_SIGNING_KEY}"
        volumes:
            - ./data/filer:/data
            - ./config/filer.toml:/etc/seaweedfs/filer.toml:ro
            - ./config/security.toml:/etc/seaweedfs/security.toml:ro
        logging: *default-logging
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${SFS_FILER_PORT:-8888}/ >/dev/null",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 30s
            timeout: 5s
        command: |
            filer
             -master=sfs-master:${SFS_MASTER_PORT:-9333}
             -ip=sfs-filer
            -ip.bind=0.0.0.0
            -port=${SFS_FILER_PORT:-8888}
            -metricsPort=${SFS_FILER_METRICS_PORT:-9326}

    # ─────────────────────────────────────────────────────────
    # S3 GATEWAY
    # ─────────────────────────────────────────────────────────
    sfs-s3:
        image: docker.io/chrislusf/seaweedfs:4.32_large_disk_full
        container_name: sds-gateway-local-sfs-s3
        user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
        restart: unless-stopped
        depends_on:
            - sfs-master
            - sfs-volume
            - sfs-filer
        networks:
            - sds-gateway-local-seaweed-net
            - sds-network-local
        ports:
            - "${SFS_S3_PORT:-8333}:${SFS_S3_PORT:-8333}"
        environment:
            WEED_JWT_FILER_SIGNING_KEY: "${JWT_FILER_SIGNING_KEY}"
            WEED_S3_SSE_KEK: "${S3_SSE_KEK}"
        volumes:
            - ./config/s3-config.json:/etc/seaweedfs/s3.json:ro
        logging: *default-logging
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${SFS_S3_PORT:-8333}/healthz >/dev/null",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 30s
            timeout: 5s
        command: |
            s3
             -filer=sfs-filer:${SFS_FILER_PORT:-8888}
            -ip.bind=0.0.0.0
            -port=${SFS_S3_PORT:-8333}
            -config=/etc/seaweedfs/s3.json
            -metricsPort=${SFS_S3_METRICS_PORT:-9327}

    # ─────────────────────────────────────────────────────────
    # WEBDAV
    # ─────────────────────────────────────────────────────────
    sfs-webdav:
        image: docker.io/chrislusf/seaweedfs:4.32_large_disk_full
        container_name: sds-gateway-local-sfs-webdav
        user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
        restart: unless-stopped
        depends_on:
            - sfs-master
            - sfs-volume
            - sfs-filer
        networks:
            - sds-gateway-local-seaweed-net
        ports:
            - "${SFS_WEBDAV_PORT:-7333}:${SFS_WEBDAV_PORT:-7333}"
        logging: *default-logging
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -sS -o /dev/null http://localhost:${SFS_WEBDAV_PORT:-7333}/",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 30s
            timeout: 5s
        command: |
            webdav
             -filer=sfs-filer:${SFS_FILER_PORT:-8888}

    # ─────────────────────────────────────────────────────────
    # PROMETHEUS — pull-based metrics
    # ─────────────────────────────────────────────────────────
    sfs-prometheus:
        image: docker.io/prom/prometheus:v2.53.0
        container_name: sds-gateway-local-sfs-prometheus
        restart: unless-stopped
        depends_on:
            - sfs-s3
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget --spider -q http://localhost:${SFS_PROMETHEUS_CONTAINER_PORT:-9090}/-/healthy || exit 1",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 30s
            timeout: 5s
        networks:
            - sds-gateway-local-seaweed-net
        ports:
            - "${SFS_PROMETHEUS_HOST_PORT:-9000}:${SFS_PROMETHEUS_CONTAINER_PORT:-9090}"
        volumes:
            - prometheus-data:/prometheus
            - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
        command:
            - "--config.file=/etc/prometheus/prometheus.yaml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
