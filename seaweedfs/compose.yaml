# URLS:
#   SeaweedFS cluster status:   http://localhost:${SFS_MASTER_PORT:-9333}
#                               http://localhost:9333
#   SeaweedFS volume status:    http://localhost:${SFS_VOLUME_PORT:-8080}/ui/index.html
#                               http://localhost:8080/ui/index.html
#   File browser:               http://localhost:${SFS_FILER_PORT:-8888}
#                               http://localhost:8888
#   S3 API:                     http://localhost:${SFS_S3_PORT:-8333}
#                               http://localhost:8333
#   WebDAV:                     http://localhost:${SFS_WEBDAV_PORT:-7333}
#                               http://localhost:7333
#   Prometheus metrics:         http://localhost:${SFS_PROMETHEUS_HOST_PORT:-9000}/targets
#                               http://localhost:9000/targets

volumes:
    # for safety, all local volumes start with "sds-gateway-local-"
    sds-gateway-local-sfs-master-meta:
#     sds-gateway-local-sfs-filer-data:

networks:
    # for safety, all gateway local networks start with "sds-gateway-local-"
    sds-gateway-local-seaweed-net:
        driver: bridge
    sds-network-local:
        external: true # shared with gateway — see gateway/compose.local.yaml

services:
    sds-gateway-local-sfs-master:
        image: docker.io/chrislusf/seaweedfs:4.17_large_disk
        container_name: sds-gateway-local-sfs-master
        user: "${UID:-1000}:${GID:-1000}"
        ports:
            - ${SFS_MASTER_PORT:-9333}:${SFS_MASTER_PORT:-9333}
            - ${SFS_MASTER_GRPC_PORT:-19333}:${SFS_MASTER_GRPC_PORT:-19333}
            - ${SFS_MASTER_METRICS_PORT:-9324}:${SFS_MASTER_METRICS_PORT:-9324}
        command: |
            master
                -ip=sds-gateway-local-sfs-master
                -ip.bind=0.0.0.0
                -metricsPort=${SFS_MASTER_METRICS_PORT:-9324}
        restart: unless-stopped
        tty: true
        volumes:
            # configurations
            - source: ./config/
              target: /etc/seaweedfs/
              type: bind
              read_only: true
            # - source: sds-gateway-local-sfs-master-meta
            #   target: /meta
            #   type: volume
            #   read_only: false
            # - source: ./config/certs
            #   target: /etc/seaweedfs/certs
            #   type: bind
            #   read_only: true
        networks:
            - sds-gateway-local-seaweed-net
        deploy:
            placement:
                max_replicas_per_node: 1

    sds-gateway-local-sfs-volume:
        image: docker.io/chrislusf/seaweedfs:4.17_large_disk
        container_name: sds-gateway-local-sfs-volume
        user: "${UID:-1000}:${GID:-1000}"
        ports:
            - ${SFS_VOLUME_PORT:-8080}:${SFS_VOLUME_PORT:-8080}
            - ${SFS_VOLUME_GRPC_PORT:-18080}:${SFS_VOLUME_GRPC_PORT:-18080}
            - ${SFS_VOLUME_METRICS_PORT:-9325}:${SFS_VOLUME_METRICS_PORT:-9325}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${SFS_VOLUME_PORT:-8080}/healthz >/dev/null",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 15s
            timeout: 5s
        # for prod:
        # -dir="/data1/volumes,/data2/volumes,/data3/volumes,/data4/volumes,/data5/volumes,/data6/volumes,/data7/volumes,/data8/volumes"
        command: |
            volume
                -dir=/data/volumes
                -ip.bind=0.0.0.0
                -ip=sds-gateway-local-sfs-volume
                -master="sds-gateway-local-sfs-master:${SFS_MASTER_PORT:-9333}"
                -max=0
                -metricsPort=${SFS_VOLUME_METRICS_PORT:-9325}
                -port=${SFS_VOLUME_PORT:-8080}
        # entrypoint: /bin/sh
        # command: -c "while true; do sleep 30; done"
        depends_on:
            - sds-gateway-local-sfs-master
        tty: true
        restart: unless-stopped
        volumes:
            # data (uid and guid should have read/write permissions to this directory)
            - source: ./data/volumes
              target: /data/volumes
              type: bind
              read_only: false
            # configurations
            - source: ./config/
              target: /etc/seaweedfs/
              type: bind
              read_only: true
            # - source: ./config/volumes:/etc/seaweedfs/volumes
            #   target: /etc/seaweedfs/volumes
            #   type: bind
            #   read_only: true
            # for prod, e.g.:
            # - /mnt/disk1/seaweedfs:/data1
            # - /mnt/disk2/seaweedfs:/data2
            # - /mnt/disk3/seaweedfs:/data3
            # - /mnt/disk4/seaweedfs:/data4
            # - /mnt/disk5/seaweedfs:/data5
            # - /mnt/disk6/seaweedfs:/data6
            # - /mnt/disk7/seaweedfs:/data7
            # - /mnt/disk8/seaweedfs:/data8
        networks:
            - sds-gateway-local-seaweed-net
    sds-gateway-local-sfs-filer:
        image: docker.io/chrislusf/seaweedfs:4.17_large_disk
        container_name: sds-gateway-local-sfs-filer
        user: "${UID:-1000}:${GID:-1000}"
        ports:
            - ${SFS_FILER_PORT:-8888}:${SFS_FILER_PORT:-8888}
            - ${SFS_FILER_GRPC_PORT:-18888}:${SFS_FILER_GRPC_PORT:-18888}
            - ${SFS_FILER_METRICS_PORT:-9326}:${SFS_FILER_METRICS_PORT:-9326}
        command: 'filer -ip=sds-gateway-local-sfs-filer -master="sds-gateway-local-sfs-master:${SFS_MASTER_PORT:-9333}" -ip.bind=0.0.0.0 -metricsPort=${SFS_FILER_METRICS_PORT:-9326}'
        tty: true
        stdin_open: true
        depends_on:
            - sds-gateway-local-sfs-master
            - sds-gateway-local-sfs-volume
        volumes:
            # persistence: IMPORTANT: must be a parent of filer.toml's leveldb2.dir
            - source: ./data/filer
              target: /data/filer
              type: bind
              read_only: false
            # configurations
            - source: ./config/
              target: /etc/seaweedfs/
              type: bind
              read_only: true
        networks:
            - sds-gateway-local-seaweed-net
        restart: unless-stopped

    # S3-compatible endpoint for the gateway Django app.
    # Set AWS_S3_ENDPOINT_URL and MINIO_ENDPOINT_URL to sds-gateway-local-sfs-s3:8333
    sds-gateway-local-sfs-s3:
        image: docker.io/chrislusf/seaweedfs:4.17_large_disk
        container_name: sds-gateway-local-sfs-s3
        user: "${UID:-1000}:${GID:-1000}"
        ports:
            - ${SFS_S3_PORT:-8333}:${SFS_S3_PORT:-8333}
            - ${SFS_S3_METRICS_PORT:-9327}:${SFS_S3_METRICS_PORT:-9327}
        command: 's3 -filer="sds-gateway-local-sfs-filer:${SFS_FILER_PORT:-8888}" -ip.bind=0.0.0.0 -metricsPort=${SFS_S3_METRICS_PORT:-9327}'
        depends_on:
            - sds-gateway-local-sfs-master
            - sds-gateway-local-sfs-volume
            - sds-gateway-local-sfs-filer
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${SFS_S3_PORT:-8333}/healthz >/dev/null",
                ]
            interval: 15s
            retries: 5
            start_interval: 5s
            start_period: 15s
            timeout: 5s
        networks:
            - sds-gateway-local-seaweed-net
            - sds-network-local
        restart: unless-stopped

    sds-gateway-local-sfs-webdav:
        image: docker.io/chrislusf/seaweedfs:4.17_large_disk
        container_name: sds-gateway-local-sfs-webdav
        user: "${UID:-1000}:${GID:-1000}"
        ports:
            - ${SFS_WEBDAV_PORT:-7333}:${SFS_WEBDAV_PORT:-7333}
        command: 'webdav -filer="sds-gateway-local-sfs-filer:${SFS_FILER_PORT:-8888}"'
        depends_on:
            - sds-gateway-local-sfs-master
            - sds-gateway-local-sfs-volume
            - sds-gateway-local-sfs-filer
        networks:
            - sds-gateway-local-seaweed-net
        restart: unless-stopped

    sds-gateway-local-sfs-prometheus:
        image: docker.io/prom/prometheus:latest
        container_name: sds-gateway-local-sfs-prometheus
        ports:
            - ${SFS_PROMETHEUS_HOST_PORT:-9000}:${SFS_PROMETHEUS_CONTAINER_PORT:-9090}
        volumes:
            - ./prometheus:/etc/prometheus
        command: "--web.enable-lifecycle --config.file=/etc/prometheus/prometheus.yaml"
        depends_on:
            - sds-gateway-local-sfs-s3
        restart: unless-stopped
        networks:
            - sds-gateway-local-seaweed-net
