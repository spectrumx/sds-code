    enabled    = false
    masterName = "master"
    password   = ""
    username   = ""
    # prefix for filer redis keys
    ca_cert_path     = ""
    client_cert_path = ""
    client_key_path  = ""
    enable_tls       = false
    keyPrefix        = ""

[redis_cluster2]
    addresses = [
        "localhost:30001",
        "localhost:30002",
        "localhost:30003",
        "localhost:30004",
        "localhost:30005",
        "localhost:30006",
    ]
    enabled = false
    password = ""
    username = ""
    # prefix for filer redis keys
    ca_cert_path     = ""
    client_cert_path = ""
    client_key_path  = ""
    enable_tls       = false
    keyPrefix        = ""
