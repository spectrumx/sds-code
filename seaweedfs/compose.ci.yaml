# CI COMPOSE FILE — SeaweedFS stack
# Container names and resources start with "sds-gateway-ci-" to avoid accidents.
# Uses named volumes (ephemeral) instead of bind mounts for data directories.
# Skips prometheus and webdav to minimize resource usage in CI.

volumes:
  sds-gateway-ci-sfs-volume-data: {}
  sds-gateway-ci-sfs-filer-data: {}

networks:
  sds-gateway-ci-seaweed-net:
    driver: bridge
  sds-network-ci:
    external: true

services:
  sds-gateway-ci-sfs-master:
    image: docker.io/chrislusf/seaweedfs:4.17_large_disk
    container_name: sds-gateway-ci-sfs-master
    user: "${UID:-1000}:${GID:-1000}"
    command: |
      master
          -ip=sds-gateway-ci-sfs-master
          -ip.bind=0.0.0.0
          -metricsPort=${SFS_MASTER_METRICS_PORT:-9324}
    restart: unless-stopped
    tty: true
    volumes:
      - source: ./config/
        target: /etc/seaweedfs/
        type: bind
        read_only: true
    networks:
      - sds-gateway-ci-seaweed-net
    deploy:
      placement:
        max_replicas_per_node: 1

  sds-gateway-ci-sfs-volume:
    image: docker.io/chrislusf/seaweedfs:4.17_large_disk
    container_name: sds-gateway-ci-sfs-volume
    user: "${UID:-1000}:${GID:-1000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${SFS_VOLUME_PORT:-8080}/healthz >/dev/null",
        ]
      interval: 15s
      retries: 5
      start_interval: 5s
      start_period: 15s
      timeout: 5s
    command: |
      volume
          -dir=/data/volumes
          -ip.bind=0.0.0.0
          -ip=sds-gateway-ci-sfs-volume
          -master="sds-gateway-ci-sfs-master:${SFS_MASTER_PORT:-9333}"
          -max=0
          -metricsPort=${SFS_VOLUME_METRICS_PORT:-9325}
          -port=${SFS_VOLUME_PORT:-8080}
    depends_on:
      - sds-gateway-ci-sfs-master
    tty: true
    restart: unless-stopped
    volumes:
      - source: sds-gateway-ci-sfs-volume-data
        target: /data/volumes
        type: volume
      - source: ./config/
        target: /etc/seaweedfs/
        type: bind
        read_only: true
    networks:
      - sds-gateway-ci-seaweed-net

  sds-gateway-ci-sfs-filer:
    image: docker.io/chrislusf/seaweedfs:4.17_large_disk
    container_name: sds-gateway-ci-sfs-filer
    user: "${UID:-1000}:${GID:-1000}"
    command: 'filer -ip=sds-gateway-ci-sfs-filer -master="sds-gateway-ci-sfs-master:${SFS_MASTER_PORT:-9333}" -ip.bind=0.0.0.0 -metricsPort=${SFS_FILER_METRICS_PORT:-9326}'
    tty: true
    stdin_open: true
    depends_on:
      - sds-gateway-ci-sfs-master
      - sds-gateway-ci-sfs-volume
    volumes:
      - source: sds-gateway-ci-sfs-filer-data
        target: /data/filer
        type: volume
      - source: ./config/
        target: /etc/seaweedfs/
        type: bind
        read_only: true
    networks:
      - sds-gateway-ci-seaweed-net
    restart: unless-stopped

  sds-gateway-ci-sfs-s3:
    image: docker.io/chrislusf/seaweedfs:4.17_large_disk
    container_name: sds-gateway-ci-sfs-s3
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - ${SFS_S3_PORT:-8333}:${SFS_S3_PORT:-8333}
    command: 's3 -filer="sds-gateway-ci-sfs-filer:${SFS_FILER_PORT:-8888}" -ip.bind=0.0.0.0 -metricsPort=${SFS_S3_METRICS_PORT:-9327}'
    depends_on:
      - sds-gateway-ci-sfs-master
      - sds-gateway-ci-sfs-volume
      - sds-gateway-ci-sfs-filer
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${SFS_S3_PORT:-8333}/healthz >/dev/null",
        ]
      interval: 15s
      retries: 5
      start_interval: 5s
      start_period: 15s
      timeout: 5s
    networks:
      - sds-gateway-ci-seaweed-net
      - sds-network-ci
    restart: unless-stopped
