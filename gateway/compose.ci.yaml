# CI COMPOSE FILE
# Make sure images, container names, and other assets start with "sds-gateway-ci-"
#   to underline its importance and avoid accidents.
# Also try to keep it as close to the production
#   file as possible to simplify the deployment process.

volumes:
    # for safety, all CI volumes start with "sds-gateway-ci-"
    sds-gateway-ci-app-media: {} # for Django media files
    sds-gateway-ci-temp-zips: {} # for temporary zip files
    sds-gateway-ci-uv-cache: {} # shared cache for uv
    sds-gateway-ci-uv-venv-app: {}
    sds-gateway-ci-uv-venv-worker: {}
    sds-gateway-ci-uv-venv-beat: {}
    sds-gateway-ci-uv-venv-flower: {}
    sds-gateway-ci-rustfs-files: {}
    sds-gateway-ci-opensearch-data: {}
    sds-gateway-ci-postgres-data-backups: {}
    sds-gateway-ci-postgres-data: {}
    sds-gateway-ci-redis-data: {}

networks:
    # for safety, all gateway CI networks start with "sds-gateway-ci-"
    sds-gateway-ci-rustfs-net:
        driver: bridge
    sds-gateway-ci-opensearch-net:
        driver: bridge
    sds-gateway-ci-postgres-net:
        driver: bridge
    sds-network-ci:
        external: true
        name: sds-network-ci
services:
    sds-gateway-ci-app:
        build:
            context: .
            dockerfile: ./compose/local/django/Dockerfile
        image: sds-gateway-ci-app
        container_name: sds-gateway-ci-app
        tty: true # colored logs
        depends_on:
            opensearch:
                condition: service_healthy
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - sds-gateway-ci-uv-cache:/opt/uv-cache/
            - sds-gateway-ci-uv-venv-app:/opt/uv-venv/
            - sds-gateway-ci-app-media:/app/sds_gateway/media # persistent media storage
            - sds-gateway-ci-temp-zips:/app/sds_gateway/media/temp_zips # temporary zip files
            - source: ./sds_gateway/api_methods/migrations
              target: /app/sds_gateway/api_methods/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/users/migrations
              target: /app/sds_gateway/users/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/visualizations/migrations
              target: /app/sds_gateway/visualizations/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z

            # - ./staticfiles/:/app/staticfiles/:z  # used in prod only
        env_file:
            - ./.envs/ci/django.env
            - ./.envs/ci/storage.env # PRIMARY (RustFS) — local/CI: primary only, no secondary
            - ./.envs/ci/postgres.env
            - ./.envs/ci/opensearch.env
        environment:
            - SKIP_POSTGRES_WAIT=1
        # remember /entrypoint runs first
        command: "/start"
        ports:
            - "8000:8000" # make sure this port matches traefik's config, if used
        networks:
            - sds-gateway-ci-rustfs-net
            - sds-gateway-ci-opensearch-net
            - sds-gateway-ci-postgres-net
            - sds-network-ci
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 5
        develop:
            watch:
                - action: sync
                  path: .
                  target: /app
                  ignore:
                      - ".venv/**/*"
                      - "node_modules/**/*"
                      - "staticfiles/**/*"

                - action: rebuild
                  path: ./pyproject.toml

    nginx:
        # nginx serves the static files generated for the gateway
        image: docker.io/nginx:1-alpine
        container_name: sds-gateway-ci-nginx
        volumes:
            - source: ./compose/production/nginx/nginx-default.conf
              target: /etc/nginx/conf.d/default.conf
              type: bind
              read_only: true
              bind:
                  selinux: z
            # e.g. curl --insecure https://sds.crc.nd.edu/static/css/project.css
            # this location is only used in local/CI; prod uses 'staticfiles/'
            - source: ./sds_gateway/static/
              target: /usr/share/nginx/static
              type: bind
              read_only: true
              bind:
                  selinux: z
        networks:
            - sds-network-ci
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O /dev/null http://localhost/ || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s

    # Primary storage (RustFS) — S3-compatible, default for local/CI
    rustfs:
        image: rustfs/rustfs:latest
        container_name: sds-gateway-ci-rustfs
        volumes:
            - sds-gateway-ci-rustfs-files:/data
        ports:
            - "19000:9000"
            - "9001:9001"
        env_file:
            - ./.envs/ci/storage.env
        environment:
            - RUSTFS_ACCESS_KEY=${PRIMARY_ACCESS_KEY_ID}
            - RUSTFS_ADDRESS=0.0.0.0:9000
            - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
            - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
            - RUSTFS_CONSOLE_ENABLE=true
            - RUSTFS_CORS_ALLOWED_ORIGINS=*
            - RUSTFS_OBS_LOGGER_LEVEL=debug
            - RUSTFS_SECRET_KEY=${PRIMARY_SECRET_ACCESS_KEY}
            - RUSTFS_VOLUMES=/data
        networks:
            - sds-gateway-ci-rustfs-net
        ulimits:
            nofile:
                soft: 131072
                hard: 131072
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s

    opensearch:
        # used for indexing and searching documents
        build:
            context: .
            dockerfile: ./compose/local/opensearch/Dockerfile
            args:
                UID: ${UID}
                GID: ${GID}
        container_name: sds-gateway-ci-opensearch
        volumes:
            - sds-gateway-ci-opensearch-data:/usr/share/opensearch/data
            - ./compose/local/opensearch/opensearch.yaml:/usr/share/opensearch/config/opensearch.yml
        env_file:
            - ./.envs/ci/opensearch.env
        ulimits:
            memlock:
                soft: -1
                hard: -1
        ports:
            - "9200:9200"
            - "9600:9600"
        networks:
            - sds-gateway-ci-opensearch-net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -u ${OPENSEARCH_USER}:${OPENSEARCH_PASSWORD} http://localhost:9200/_cluster/health?pretty | grep -q '\"status\" : \"green\"\\|\"status\" : \"yellow\"'",
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    postgres:
        # main database for the gateway app
        build:
            context: .
            dockerfile: ./compose/production/postgres/Dockerfile
            # this dockerfile is used for both local and prod
        image: sds-gateway-ci-postgres
        container_name: sds-gateway-ci-postgres
        volumes:
            - sds-gateway-ci-postgres-data:/var/lib/postgresql/data
            - sds-gateway-ci-postgres-data-backups:/backups
        env_file:
            - ./.envs/ci/postgres.env
        networks:
            - sds-gateway-ci-postgres-net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h localhost',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        # used as caching layer for the gateway app
        image: docker.io/redis:6
        container_name: sds-gateway-ci-redis
        volumes:
            - sds-gateway-ci-redis-data:/data
        networks:
            - sds-network-ci
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    # ==========================
    # Celery services for background tasks
    celery-worker:
        build:
            context: .
            dockerfile: ./compose/local/django/Dockerfile
        image: sds-gateway-ci-app
        container_name: sds-gateway-ci-celery-worker
        tty: true
        depends_on:
            sds-gateway-ci-app:
                condition: service_healthy
        volumes:
            - sds-gateway-ci-uv-cache:/opt/uv-cache/
            - sds-gateway-ci-uv-venv-worker:/opt/uv-venv/
            - sds-gateway-ci-app-media:/app/sds_gateway/media # persistent media storage
            - sds-gateway-ci-temp-zips:/app/sds_gateway/media/temp_zips # temporary zip files
            - source: ./sds_gateway/api_methods/migrations
              target: /app/sds_gateway/api_methods/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/users/migrations
              target: /app/sds_gateway/users/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/visualizations/migrations
              target: /app/sds_gateway/visualizations/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
        env_file:
            - ./.envs/ci/django.env
            - ./.envs/ci/storage.env # PRIMARY (RustFS) — local/CI: primary only, no secondary
            - ./.envs/ci/postgres.env
            - ./.envs/ci/opensearch.env
        environment:
            - SKIP_POSTGRES_WAIT=1
        command: "/worker-start"
        networks:
            - sds-gateway-ci-rustfs-net
            - sds-gateway-ci-opensearch-net
            - sds-gateway-ci-postgres-net
            - sds-network-ci
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'uv run celery -A config.celery_app inspect ping -d "celery@$$HOSTNAME" | grep -q "OK"',
                ]
            interval: 30s
            timeout: 30s
            retries: 5
            start_period: 30s

    celery-beat:
        # Celery Beat scheduler for periodic tasks
        build:
            context: .
            dockerfile: ./compose/local/django/Dockerfile
        image: sds-gateway-ci-app
        container_name: sds-gateway-ci-celery-beat
        tty: true
        depends_on:
            sds-gateway-ci-app:
                condition: service_healthy
        volumes:
            - sds-gateway-ci-uv-cache:/opt/uv-cache/
            - sds-gateway-ci-uv-venv-beat:/opt/uv-venv/
            - sds-gateway-ci-app-media:/app/sds_gateway/media # persistent media storage
            - sds-gateway-ci-temp-zips:/app/sds_gateway/media/temp_zips # temporary zip files
            - source: ./sds_gateway/api_methods/migrations
              target: /app/sds_gateway/api_methods/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/users/migrations
              target: /app/sds_gateway/users/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/visualizations/migrations
              target: /app/sds_gateway/visualizations/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
        env_file:
            - ./.envs/ci/django.env
            - ./.envs/ci/storage.env # PRIMARY (RustFS) — local/CI: primary only, no secondary
            - ./.envs/ci/postgres.env
            - ./.envs/ci/opensearch.env
        environment:
            - SKIP_POSTGRES_WAIT=1
        command: "/beat-start"
        networks:
            - sds-gateway-ci-rustfs-net
            - sds-gateway-ci-opensearch-net
            - sds-gateway-ci-postgres-net
            - sds-network-ci
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'grep -q "beat" /proc/*/cmdline 2>/dev/null || exit 1',
                ]
            interval: 30s
            timeout: 30s
            retries: 5
            start_period: 30s

    celery-flower:
        # Celery monitoring and administration tool
        build:
            context: .
            dockerfile: ./compose/local/django/Dockerfile
        image: sds-gateway-ci-app
        container_name: sds-gateway-ci-celery-flower
        tty: true
        depends_on:
            sds-gateway-ci-app:
                condition: service_healthy
        volumes:
            - sds-gateway-ci-uv-cache:/opt/uv-cache/
            - sds-gateway-ci-uv-venv-flower:/opt/uv-venv/
            - sds-gateway-ci-app-media:/app/sds_gateway/media
            - sds-gateway-ci-temp-zips:/app/sds_gateway/media/temp_zips
            - source: ./sds_gateway/api_methods/migrations
              target: /app/sds_gateway/api_methods/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/users/migrations
              target: /app/sds_gateway/users/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
            - source: ./sds_gateway/visualizations/migrations
              target: /app/sds_gateway/visualizations/migrations
              type: bind
              read_only: false
              bind:
                  selinux: z
        env_file:
            - ./.envs/ci/django.env
            - ./.envs/ci/storage.env # PRIMARY (RustFS) — local/CI: primary only, no secondary
            - ./.envs/ci/postgres.env
            - ./.envs/ci/opensearch.env
        environment:
            - SKIP_POSTGRES_WAIT=1
        command: "/flower-start"
        ports:
            - "5555:5555" # Flower web interface
        networks:
            - sds-gateway-ci-rustfs-net
            - sds-gateway-ci-opensearch-net
            - sds-gateway-ci-postgres-net
            - sds-network-ci
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'curl -f --header "Authorization: Basic $(echo -n "$$CELERY_FLOWER_USER:$$CELERY_FLOWER_PASSWORD" | base64)" http://localhost:5555/api/workers || exit 1',
                ]
            interval: 30s
            timeout: 30s
            retries: 5
            start_period: 30s

    # ==========================
    # local development services
    node:
        # used for frontend development and hot reloading
        build:
            context: .
            dockerfile: ./compose/local/node/Dockerfile
        image: sds-gateway-ci-node
        container_name: sds-gateway-ci-node
        networks:
            - sds-network-ci
        depends_on:
            - sds-gateway-ci-app
        volumes:
            # http://jdlm.info/articles/2016/03/06/lessons-building-node-app-docker.html
            - /app/node_modules
            # Bind mount project directory for running tests
            - source: .
              target: /app/
              type: bind
              bind:
                  selinux: z
        command: "pnpm run dev"
        ports:
            - "3000:3000"
        develop:
            watch:
                - action: sync
                  path: ./
                  target: /app/
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'node -e "const http=require(\"http\"); const req=http.get(\"http://127.0.0.1:3000\", res => process.exit(res.statusCode < 500 ? 0 : 1)); req.on(\"error\", () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });"',
                ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 45s

    mailhog:
        # email testing service for local development
        image: mailhog/mailhog:latest
        container_name: sds-gateway-ci-mailhog
        ports:
            - "1025:1025" # SMTP server
            - "8025:8025" # Web UI
        networks:
            - sds-network-ci
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O /dev/null http://localhost:8025/api/v2/messages || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s
