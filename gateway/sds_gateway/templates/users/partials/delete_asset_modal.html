<!-- Delete asset confirmation (capture list + dataset list) -->
<div class="modal fade"
     id="deleteAssetModal"
     tabindex="-1"
     aria-labelledby="deleteAssetModalLabel"
     aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger" id="deleteAssetModalLabel">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>Delete <span id="delete-asset-type-label">asset</span>
                </h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-2">
                    You are about to permanently delete
                    <strong id="delete-asset-name">this asset</strong>.
                </p>
                <div class="alert alert-warning mb-0" role="alert">
                    This action cannot be undone. The asset will be removed from your account
                    and will no longer appear in lists or search results.
                </div>
                <div id="delete-asset-message" class="alert alert-danger d-none mt-3" role="alert"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button"
                        class="btn btn-danger"
                        id="delete-asset-confirm-btn">Delete permanently</button>
            </div>
        </div>
    </div>
</div>
