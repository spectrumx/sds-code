# ⚠️ PRODUCTION COMPOSE FILE ⚠️
# Make sure images, container names, and other assets start with "sds-gateway-prod-"
#   to underline its importance and avoid accidents.
# Also try to keep it as close to the production
#   file as possible to simplify the deployment process.

volumes:
    # for safety, all gateway production volumes start with "sds-gateway-prod-"

    # permament data:
    sds-gateway-prod-app-media: {}
    sds-gateway-prod-opensearch-data: {}
    sds-gateway-prod-postgres-data-backups: {}
    sds-gateway-prod-postgres-data: {}
    sds-gateway-prod-redis-data: {}

    # good to keep around:
    sds-gateway-prod-rustfs-logs: {}
    sds-gateway-prod-temp-zips: {}

    # data that can be reconstructed:
    sds-gateway-prod-static: {}
    sds-gateway-prod-uv-cache: {}
    sds-gateway-prod-uv-venv-app: {}
    sds-gateway-prod-uv-venv-beat: {}
    sds-gateway-prod-uv-venv-flower: {}
    sds-gateway-prod-uv-venv-worker: {}

networks:
    # for safety, all gateway production networks start with "sds-gateway-prod-"
    sds-gateway-prod-minio-net:
        driver: bridge
    sds-gateway-prod-opensearch-net:
        driver: bridge
    sds-gateway-prod-postgres-net:
        driver: bridge
    sds-network-prod:
        external: true

services:
    sds-gateway-prod-app:
        build:
            context: .
            dockerfile: ./compose/production/django/Dockerfile
        image: sds-gateway-prod-app
        container_name: sds-gateway-prod-app
        tty: true
        depends_on:
            opensearch:
                condition: service_healthy
            postgres:
                condition: service_started
            redis:
                condition: service_started
        volumes:
            - source: sds-gateway-prod-app-media
              target: /app/sds_gateway/media
              type: volume
              read_only: false
            - source: sds-gateway-prod-temp-zips
              target: /app/sds_gateway/media/temp_zips
              type: volume
              read_only: false
            - source: sds-gateway-prod-static
              target: /app/staticfiles/
              type: volume
              read_only: false
            - source: ./opensearch/data/certs-django
              target: /app/opensearch/data/certs
              type: bind
              read_only: true
              bind:
                  selinux: z
            - source: sds-gateway-prod-uv-cache
              target: /opt/uv-cache/
              type: volume
              read_only: false
            - source: sds-gateway-prod-uv-venv-app
              target: /opt/uv-venv/
              type: volume
              read_only: false
        post_start:
            - command:
                  chown -R django:django /app/sds_gateway/media/ /opt/uv-cache/
                  /opt/uv-venv/
              user: root
        env_file:
            - ./.envs/production/django.env
            - ./.envs/production/opensearch.env
            - ./.envs/production/postgres.env
            - ./.envs/production/storage.env
        ports:
            - "18000:18000" # make sure this port matches traefik's config, if used
        # remember /entrypoint runs first
        restart: unless-stopped
        command: "/start"
        networks:
            - sds-gateway-prod-opensearch-net
            - sds-gateway-prod-postgres-net
            - sds-network-prod # also carries SeaweedFS S3 traffic — see seaweedfs/compose.yaml
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:18000/ || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 5

    nginx:
        # nginx serves the static files generated for the gateway
        image: docker.io/nginx:1-alpine
        container_name: sds-gateway-prod-nginx
        restart: unless-stopped
        volumes:
            - source: ./compose/production/nginx/nginx-default.conf
              target: /etc/nginx/conf.d/default.conf
              type: bind
              read_only: true
              bind:
                  selinux: z
            # e.g. curl --insecure https://sds.crc.nd.edu/static/css/project.css
            # - This path in app is: /app/staticfiles/ mounted as a managed volume
            - source: sds-gateway-prod-static
              target: /usr/share/nginx/static/
              type: volume
              read_only: true
        networks:
            - sds-network-prod
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O /dev/null http://localhost/healthz || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s

    # minio:
    #     # https://min.io/docs/minio/container/operations/install-deploy-manage/upgrade-minio-deployment.html
    #     image: docker.io/minio/minio:latest
    #     container_name: sds-gateway-prod-secondary-minio
    #     volumes:
    #         - /disk1:/data/disk1
    #         - /disk2:/data/disk2
    #         - /disk3:/data/disk3
    #         # - ./.envs/production/minio-config.json:/tmp/.mc/config.json
    #     ports:
    #         - "19100:9000" # deprecated minio S3 API is 19000
    #         - "19101:9001" # deprecated minio console is 19001
    #     env_file:
    #         - ./.envs/production/storage.env
    #     restart: unless-stopped
    #     healthcheck:
    #         test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
    #         interval: 30s
    #         timeout: 5s
    #         retries: 5
    #         start_period: 10s
    #     command: "server --json /data/disk{1...3} --console-address \":9001\""
    #     networks:
    #         - sds-gateway-prod-minio-net
    #     ulimits:
    #         nofile:
    #             soft: 131072
    #             hard: 131072

    # RustFS S3-compatible storage service, used as the secondary storage backend for
    # the gateway in production. The primary S3 storage backend in production is
    # SeaweedFS, defined in ../seaweedfs/compose.production.yaml .
    # At the time of writing, RustFS is not yet ready for production use, so we keep it
    # as our secondary backend, as redundancy.
    rustfs:
        image: docker.io/rustfs/rustfs:latest
        container_name: sds-gateway-prod-secondary-rustfs
        security_opt:
            - "no-new-privileges:true"
        ports:
            - "19400:9000" # S3 API port
            - "19401:9001" # Console port
        env_file:
            - ./.envs/production/storage.env
        environment:
            - RUSTFS_ACCESS_KEY=${PRIMARY_ACCESS_KEY_ID}
            - RUSTFS_ADDRESS=0.0.0.0:9000
            - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
            - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
            - RUSTFS_CONSOLE_ENABLE=true
            - RUSTFS_CORS_ALLOWED_ORIGINS=*
            - RUSTFS_OBS_LOGGER_LEVEL=debug
            - RUSTFS_OBS_LOGGER_FORMAT=json
            - RUSTFS_SECRET_KEY=${PRIMARY_SECRET_ACCESS_KEY}
            # - RUSTFS_TLS_PATH=/opt/tls
            - RUSTFS_VOLUMES=/data/rustfs1
        volumes:
            - ./data/rustfs/d1:/data/rustfs1
            - sds-gateway-prod-rustfs-logs:/app/logs
        networks:
            - sds-network-prod
        ulimits:
            nofile:
                soft: 131072
                hard: 131072
        # entrypoint: "sleep"
        # command: "600"
        restart: unless-stopped
        healthcheck:
            test: [
                    "CMD",
                    "sh",
                    "-c",
                    "curl -f http://127.0.0.1:9000/health && curl -f
                    http://127.0.0.1:9001/rustfs/console/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # RustFS volume permissions fixer service
    # Run this service if rustfs is logging permission issues
    rustfs-perm:
        image: alpine
        container_name: sds-gateway-prod-rustfs-permissions
        volumes:
            - /disk6:/data1
            - /disk7:/data2
            - /disk8:/data3
            - sds-gateway-prod-rustfs-logs:/logs
        command: >
            sh -c "
              chown -R 10001:10001 /data1 /data2 /data3 /logs &&
              echo 'Volume Permissions fixed' &&
              exit 0
            "
        restart: "no"

    opensearch:
        # used for indexing and searching documents
        build:
            context: .
            dockerfile: ./compose/production/opensearch/Dockerfile
            args:
                UID: ${UID}
                GID: ${GID}
        container_name: sds-gateway-prod-opensearch
        volumes:
            - source: sds-gateway-prod-opensearch-data
              target: /usr/share/opensearch/data
              type: volume
              read_only: false
            - source: ./compose/production/opensearch/opensearch.yaml
              target: /usr/share/opensearch/config/opensearch.yml
              type: bind
              read_only: true
              bind:
                  selinux: z
            - source: ./opensearch/data/certs
              target: /usr/share/opensearch/config/certs
              type: bind
              read_only: true
              bind:
                  selinux: z
            - source: ./opensearch/data/snapshots
              target: /mnt/snapshots
              type: bind
              read_only: false
              bind:
                  selinux: z
        env_file:
            - ./.envs/production/opensearch.env
        ulimits:
            memlock:
                soft: -1
                hard: -1
        ports:
            - "19200:9200"
            - "19600:9600"
        networks:
            - sds-gateway-prod-opensearch-net
        restart: unless-stopped
        tty: true
        healthcheck:
            test: [
                    "CMD-SHELL",
                    "curl -k -u
                    \"$OPENSEARCH_ADMIN_USER:$OPENSEARCH_INITIAL_ADMIN_PASSWO\
                    RD\" https://localhost:9200/_cluster/health || exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    postgres:
        # main database for the gateway app
        build:
            context: .
            dockerfile: ./compose/production/postgres/Dockerfile
        image: sds-gateway-prod-postgres
        container_name: sds-gateway-prod-postgres
        command: "-c 'max_connections=300'"
        restart: unless-stopped
        volumes:
            - sds-gateway-prod-postgres-data:/var/lib/postgresql/data
            - sds-gateway-prod-postgres-data-backups:/backups
        env_file:
            - ./.envs/production/postgres.env
        networks:
            - sds-gateway-prod-postgres-net
            - sds-gateway-prod-opensearch-net
        healthcheck:
            test: [
                    "CMD-SHELL",
                    'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h
                    localhost',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        # used as caching layer for the gateway app
        image: docker.io/redis:6
        container_name: sds-gateway-prod-redis
        restart: unless-stopped
        volumes:
            - sds-gateway-prod-redis-data:/data
        networks:
            - sds-network-prod
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    # ===================
    # Celery services for background tasks
    celery-worker:
        build:
            context: .
            dockerfile: ./compose/production/django/Dockerfile
        image: sds-gateway-prod-app
        container_name: sds-gateway-prod-celery-worker
        tty: true
        depends_on:
            sds-gateway-prod-app:
                condition: service_started
        volumes:
            - source: sds-gateway-prod-uv-cache
              target: /opt/uv-cache/
              type: volume
              read_only: false
            - source: sds-gateway-prod-app-media
              target: /app/sds_gateway/media
              type: volume
              read_only: false
            - source: sds-gateway-prod-temp-zips
              target: /app/sds_gateway/media/temp_zips
              type: volume
              read_only: false
            - source: ./opensearch/data/certs-django
              target: /app/opensearch/data/certs
              type: bind
              read_only: true
              bind:
                  selinux: z
            - source: sds-gateway-prod-uv-venv-worker
              target: /opt/uv-venv/
              type: volume
              read_only: false
        post_start:
            - command:
                  chown -R django:django /app/sds_gateway/media/ /opt/uv-cache/
                  /opt/uv-venv/
              user: root
        env_file:
            - ./.envs/production/django.env
            - ./.envs/production/opensearch.env
            - ./.envs/production/postgres.env
            - ./.envs/production/storage.env
        command: "/worker-start"
        restart: unless-stopped
        networks:
            - sds-gateway-prod-opensearch-net
            - sds-gateway-prod-postgres-net
            - sds-network-prod # also carries SeaweedFS S3 traffic
        healthcheck:
            test: [
                    "CMD-SHELL",
                    'uv run celery -A config.celery_app inspect ping -d
                    "celery@$$HOSTNAME" | grep -q "OK"',
                ]
            interval: 30s
            timeout: 30s
            retries: 5
            start_period: 30s

    celery-beat:
        # Celery Beat scheduler for periodic tasks
        build:
            context: .
            dockerfile: ./compose/production/django/Dockerfile
        image: sds-gateway-prod-app
        container_name: sds-gateway-prod-celery-beat
        depends_on:
            sds-gateway-prod-app:
                condition: service_started
        volumes:
            - source: sds-gateway-prod-uv-cache
              target: /opt/uv-cache/
              type: volume
              read_only: false
            - source: sds-gateway-prod-app-media
              target: /app/sds_gateway/media
              type: volume
              read_only: false
            - source: sds-gateway-prod-temp-zips
              target: /app/sds_gateway/media/temp_zips
              type: volume
              read_only: false
            - source: ./opensearch/data/certs-django
              target: /app/opensearch/data/certs
              type: bind
              read_only: true
              bind:
                  selinux: z
            - source: sds-gateway-prod-uv-venv-beat
              target: /opt/uv-venv/
              type: volume
              read_only: false
        post_start:
            - command:
                  chown -R django:django /app/sds_gateway/media/ /opt/uv-cache/
                  /opt/uv-venv/
              user: root
        env_file:
            - ./.envs/production/django.env
            - ./.envs/production/opensearch.env
            - ./.envs/production/postgres.env
            - ./.envs/production/storage.env
        command: "/beat-start"
        restart: unless-stopped
        networks:
            - sds-gateway-prod-opensearch-net
            - sds-gateway-prod-postgres-net
            - sds-network-prod # also carries SeaweedFS S3 traffic
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'grep -q "beat" /proc/*/cmdline 2>/dev/null || exit 1',
                ]
            interval: 30s
            timeout: 30s
            retries: 5
            start_period: 30s

    celery-flower:
        # Celery monitoring and administration tool
        build:
            context: .
            dockerfile: ./compose/production/django/Dockerfile
        image: sds-gateway-prod-app
        container_name: sds-gateway-prod-celery-flower
        tty: true
        depends_on:
            sds-gateway-prod-app:
                condition: service_started
        volumes:
            - source: sds-gateway-prod-uv-cache
              target: /opt/uv-cache/
              type: volume
              read_only: false
            - source: sds-gateway-prod-app-media
              target: /app/sds_gateway/media
              type: volume
              read_only: false
            - source: sds-gateway-prod-temp-zips
              target: /app/sds_gateway/media/temp_zips
              type: volume
              read_only: false
            - source: sds-gateway-prod-uv-venv-flower
              target: /opt/uv-venv/
              type: volume
              read_only: false
        post_start:
            - command:
                  chown -R django:django /app/sds_gateway/media/ /opt/uv-cache/
                  /opt/uv-venv/
              user: root
        env_file:
            - ./.envs/production/django.env
            - ./.envs/production/opensearch.env
            - ./.envs/production/postgres.env
            - ./.envs/production/storage.env
        command: "/flower-start"
        restart: unless-stopped
        ports:
            - "15555:5555" # Flower web interface
        networks:
            - sds-gateway-prod-opensearch-net
            - sds-gateway-prod-postgres-net
            - sds-network-prod # also carries SeaweedFS S3 traffic
        healthcheck:
            test: [
                    "CMD-SHELL",
                    'curl -f --header "Authorization: Basic $(echo -n
                    "$$CELERY_FLOWER_USER:$$CELERY_FLOWER_PASSWORD" |
                    base64)" http://localhost:5555/api/workers || exit 1',
                ]
            interval: 30s
            timeout: 30s
            retries: 5
            start_period: 30s
