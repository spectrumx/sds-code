networks:
  sds-network-local:
    external: true
    name: sds-network-local
  sds-gateway-local-opensearch-net:
    external: true
    name: sds-gateway-local-opensearch-net

services:
  sds-federation-local-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: sds-federation-local-sync
    container_name: sds-federation-local-sync
    env_file:
      - .envs/local/sync.env
      - ../gateway/.envs/local/opensearch.env
      - ../federation-shared.env
    environment:
      FEDERATION_CONFIG_PATH: /etc/sds/federation.toml
      GATEWAY_INTERNAL_BASE_URL: http://sds-gateway-local-app:8000/api/v1
      REDIS_URL: redis://sds-gateway-local-redis:6379/0
    volumes:
      - ./federation.toml:/etc/sds/federation.toml:ro
      - ./certs:/etc/sds/certs:ro
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "python",
          "-c",
          "import sys, httpx; r=httpx.get('http://127.0.0.1:8000/sync/health', timeout=4); sys.exit(0 if r.status_code==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sds-network-local
      - sds-gateway-local-opensearch-net
