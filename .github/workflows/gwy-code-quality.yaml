# Workflow to run pre-commit checks, django tests and template validations for the Gateway
# GitHub Action Workflow validator: https://rhysd.github.io/actionlint/
name: gateway-checks

on:
    workflow_dispatch:
        # To manually trigger the workflow
        # https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#workflow_dispatch
    push:
        paths:
            # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
            - gateway/**
        branches:
            - main
            - master
    pull_request:
        paths:
            # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
            - gateway/**
        branches:
            - main
            - master
        types:
            # https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#pull_request
            - ready_for_review
            - synchronize

env:
    DOCKER_BUILDKIT: 1
    COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
    # Run pre-commit checks on all files using the project's python version
    gwy-pre-commit:
        runs-on: ubuntu-latest
        env:
            UV_LINK_MODE: copy
        steps:
            - uses: actions/checkout@v7

            # this ubuntu-latest version ships node 18, which was causing issues
            # https://github.com/actions/setup-node#usage
            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install rust toolchain for the 'blake3' dependency
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Install uv
              uses: astral-sh/setup-uv@v8
              # https://github.com/marketplace/actions/astral-sh-setup-uv

            - name: Cache prek hooks
              id: cache-prek
              uses: actions/cache@v6
              # https://github.com/actions/cache/blob/main/examples.md#python---pip
              with:
                  key: prek-gateway-${{ hashFiles('gateway/.pre-commit-config.yaml') }}
                  path: ~/.cache/prek/

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11.5.1

            - name: Install gateway frontend dependencies
              working-directory: ./gateway
              run: pnpm install --frozen-lockfile

            - name: Install hooks
              working-directory: ./gateway
              run: uv run --extra local prek install --install-hooks

            - name: Run prek
              working-directory: ./gateway
              # make sure default_language_version in .pre-commit-config.yaml
              # matches the one installed with uv, which is the most recent
              # stable python version that meets project requirements.
              run: uv run --extra local prek run --all-files

    # Run Django tests
    gwy-django-tests:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                # uv will take care of installing other python versions,
                # so we don't need a python-version matrix here.
                # This is faster, saving some GH action minutes and dev time.
                platform: [ubuntu-latest]
        steps:
            - uses: actions/checkout@v7

            # - name: Install dependencies
            #   run: sudo apt update && sudo apt install -y rsync

            - name: Install just on ubuntu
              if: matrix.platform == 'ubuntu-latest'
              working-directory: ./gateway
              run: |
                  npm install -g rust-just

            - name: Deploy action (RustFS only — no SeaweedFS)
              run: SDS_SKIP_SFS=true ./scripts/deploy.sh ci
              working-directory: ./gateway

            - name: Run tests
              run: just test
              working-directory: ./gateway

    # Build and push Docker image to ghcr.io (only if checks pass, only on push, not PR)
    gwy-build-and-push:
        needs: [gwy-pre-commit, gwy-django-tests]
        if: github.event_name == 'push' && github.ref_name == 'master' || github.event_name == 'push' && github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to ghcr.io
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/spectrumx/sds-gateway
                  tags: |
                      type=sha,prefix=dev-,format=short
                      type=raw,value=dev,enable={{ is_default_branch }}
                  flavor: |
                      latest=false

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: gateway
                  file: gateway/compose/production/django/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      GIT_COMMIT=${{ github.sha }}
                      BUILD_ENVIRONMENT=production
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
